<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>低碳生活助手</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #22c55e;
    --primary-hover: #16a34a;
    --bg: #f0fdf4;
    --card: #ffffff;
    --text: #111827;
    --text-secondary: #6b7280;
    --border: #e5e7eb;
    --user-msg: #22c55e;
    --user-text: #fff;
    --bot-msg: #f9fafb;
    --bot-text: #111827;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif; background: var(--bg); color: var(--text); }
  body { display: flex; flex-direction: column; }

  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    box-shadow: var(--shadow);
  }
  .header-icon {
    width: 40px; height: 40px;
    background: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 20px;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .subtitle { font-size: 13px; color: var(--text-secondary); }
  .header-actions { margin-left: auto; display: flex; gap: 8px; }

  .settings-btn {
    width: 36px; height: 36px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--card); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: background .2s;
  }
  .settings-btn:hover { background: #f3f4f6; }

  .settings-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.3); animation: fadeIn .2s ease;
  }
  .settings-overlay.open { display: block; }
  .settings-panel {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 440px; max-width: 100vw;
    background: var(--card); padding: 24px; overflow-y: auto;
    box-shadow: -4px 0 20px rgba(0,0,0,.1); animation: slideIn .25s ease;
  }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  .settings-panel h2 { font-size: 16px; margin-bottom: 20px; }
  .settings-group { margin-bottom: 18px; }
  .settings-group label {
    display: block; font-size: 13px; font-weight: 500;
    color: var(--text-secondary); margin-bottom: 6px;
  }
  .settings-group input, .settings-group select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; font-family: monospace; outline: none;
    transition: border-color .2s;
  }
  .settings-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(34,197,94,.15); }
  .settings-group .hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
  .settings-actions { display: flex; gap: 10px; margin-top: 24px; }
  .settings-actions button {
    flex: 1; padding: 10px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: background .2s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-secondary { background: #f3f4f6; color: var(--text); border: 1px solid var(--border) !important; }
  .btn-secondary:hover { background: var(--border); }
  .close-btn {
    position: absolute; top: 16px; right: 16px;
    width: 32px; height: 32px; border: none; border-radius: 8px;
    background: #f3f4f6; cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }

  .status-bar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 24px; font-size: 12px; flex-shrink: 0;
    background: var(--card); border-bottom: 1px solid var(--border);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #9ca3af; flex-shrink: 0; }
  .status-dot.ok { background: #22c55e; }
  .status-dot.err { background: #ef4444; }

  .chat-container {
    flex: 1; overflow-y: auto; padding: 24px 16px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-container:empty::after {
    content: '💬 输入消息开始对话';
    display: flex; align-items: center; justify-content: center;
    height: 100%; color: var(--text-secondary); font-size: 15px;
  }

  .message { display: flex; gap: 12px; max-width: 780px; animation: fadeIn .3s ease; width: 100%; margin: 0 auto; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .message.user { flex-direction: row-reverse; align-self: flex-end; }
  .message.bot { align-self: flex-start; }

  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .message.user .avatar { background: var(--primary); color: #fff; }
  .message.bot .avatar { background: #e5e7eb; color: #374151; }

  .bubble {
    padding: 10px 16px; border-radius: var(--radius);
    font-size: 14px; line-height: 1.7; max-width: 85%;
    word-break: break-word;
  }
  .message.user .bubble { background: var(--user-msg); color: var(--user-text); border-bottom-right-radius: 4px; }
  .message.bot .bubble { background: var(--bot-msg); color: var(--bot-text); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble pre { background: #1f2937; color: #f3f4f6; padding: 12px; border-radius: 8px; overflow-x: auto; font-size: 13px; margin: 8px 0; }
  .bubble code { font-size: 13px; background: rgba(0,0,0,.06); padding: 2px 6px; border-radius: 4px; }
  .bubble p { margin: 4px 0; }
  .bubble ul, .bubble ol { padding-left: 20px; margin: 4px 0; }

  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span { width: 8px; height: 8px; border-radius: 50%; background: var(--text-secondary); animation: typing 1.4s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes typing { 0%,80%,100% { opacity:0.3; transform:scale(.8); } 40% { opacity:1; transform:scale(1); } }

  .input-area { background: var(--card); border-top: 1px solid var(--border); padding: 16px 24px; flex-shrink: 0; box-shadow: 0 -1px 3px rgba(0,0,0,.04); }
  .input-wrapper { max-width: 780px; margin: 0 auto; display: flex; gap: 12px; align-items: flex-end; }
  .input-wrapper textarea {
    flex: 1; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 14px; font-family: inherit;
    resize: none; outline: none; min-height: 48px; max-height: 150px;
    line-height: 1.5; transition: border-color .2s;
  }
  .input-wrapper textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(34,197,94,.15); }
  .send-btn {
    width: 48px; height: 48px; flex-shrink: 0; background: var(--primary);
    color: #fff; border: none; border-radius: var(--radius); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; transition: background .2s, transform .1s;
  }
  .send-btn:hover { background: var(--primary-hover); }
  .send-btn:active { transform: scale(.95); }
  .send-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* Quick action buttons */
  .quick-actions {
    max-width: 780px; margin: 0 auto 10px;
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .q-btn {
    padding: 6px 14px; border: 1px solid var(--border);
    border-radius: 20px; background: var(--card);
    color: var(--text-secondary); font-size: 13px; cursor: pointer;
    transition: all .2s; white-space: nowrap;
  }
  .q-btn:hover {
    background: var(--primary); color: #fff; border-color: var(--primary);
  }

  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: #1f2937; color: #fff; padding: 12px 24px;
    border-radius: 10px; font-size: 13px; font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,.15); z-index: 100;
    animation: fadeIn .3s ease; display: none; max-width: 90vw; text-align: center;
  }
  .toast.show { display: block; }
  .toast.error { background: #ef4444; }
  .toast.success { background: #22c55e; }

  .conv-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 10px; font-size: 11px;
    background: var(--primary-light, #dcfce7); color: #166534;
    margin-left: 8px;
  }

  @media (max-width: 640px) {
    .header { padding: 10px 16px; }
    .chat-container { padding: 16px 12px; }
    .input-area { padding: 12px 16px; }
    .bubble { max-width: 90%; font-size: 13px; }
    .settings-panel { width: 100vw; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🌱</div>
  <div>
    <h1>低碳生活助手 <span class="conv-badge" id="convBadge" style="display:none">💬 对话中</span></h1>
    <div class="subtitle">Chatflow · 有记忆的对话</div>
  </div>
  <div class="header-actions">
    <button class="settings-btn" id="settingsToggle" title="设置">⚙️</button>
  </div>
</div>

<div class="status-bar" id="statusBar">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">就绪</span>
</div>

<div class="chat-container" id="chatContainer"></div>

<div class="input-area">
  <div class="quick-actions">
    <button class="q-btn" data-text="今日人品">🎲 今日人品</button>
    <button class="q-btn" data-text="我的小树">🌳 我的小树</button>
    <button class="q-btn" data-text="当前天气">🌤️ 当前天气</button>
    <button class="q-btn" data-text="今日热点">🔥 今日热点</button>
  </div>
  <div class="input-wrapper">
    <textarea id="inputField" rows="1" placeholder="输入您的问题…" maxlength="10000"></textarea>
    <button class="send-btn" id="sendBtn" title="发送 (Enter)">➤</button>
  </div>
</div>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel">
    <button class="close-btn" id="settingsClose">✕</button>
    <h2>⚙️ 配置</h2>
    <div class="settings-group">
      <label for="inputApiBase">API 地址</label>
      <input type="url" id="inputApiBase" value="https://api.dify.ai/v1">
      <div class="hint">Dify Cloud API 基础地址</div>
    </div>
    <div class="settings-group">
      <label for="inputEndpoint">API 路径</label>
      <input type="text" id="inputEndpoint" value="/chat-messages">
      <div class="hint">Chatflow 对话端点</div>
    </div>
    <div class="settings-group">
      <label for="inputApiKey">API Key</label>
      <input type="text" id="inputApiKey" value="app-D9GZMtpHtTsHzshBV2hgemBc">
      <div class="hint">从 Dify 应用 API 访问页面获取</div>
    </div>
    <div class="settings-group">
      <label for="inputMode">响应模式</label>
      <select id="inputMode">
        <option value="blocking">blocking（同步等待）</option>
        <option value="streaming">streaming（流式）</option>
      </select>
    </div>
    <div class="settings-actions">
      <button class="btn-secondary" id="testBtn">🔍 测试连接</button>
      <button class="btn-primary" id="saveBtn">✓ 保存</button>
    </div>
    <div style="margin-top:16px;padding:12px;background:#f0fdf4;border-radius:8px;font-size:12px;color:#166534;border:1px solid #bbf7d0">
      💡 <strong>对话记忆</strong>已启用 — 每次发送都会带上 <code>conversation_id</code>，AI 能记住之前的对话。
      点击"新对话"可清除记忆，开始全新对话。
    </div>
    <button class="btn-secondary" id="newConvBtn" style="margin-top:12px;width:100%">🔄 新对话（清除记忆）</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULTS = {
  apiBase:   'https://api.dify.ai/v1',
  endpoint:  '/chat-messages',
  apiKey:    'app-D9GZMtpHtTsHzshBV2hgemBc',
  mode:      'blocking'
};

// ===== State =====
let config = loadConfig();
let isRunning = false;
let msgId = 0;
let conversationId = null;        // current conversation
const userId = 'web-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 6);

// ===== DOM =====
const chatEl      = document.getElementById('chatContainer');
const inputEl     = document.getElementById('inputField');
const sendBtn     = document.getElementById('sendBtn');
const toastEl     = document.getElementById('toast');
const statusDot   = document.getElementById('statusDot');
const statusText  = document.getElementById('statusText');
const overlay     = document.getElementById('settingsOverlay');
const toggleBtn   = document.getElementById('settingsToggle');
const closeBtn    = document.getElementById('settingsClose');
const saveBtn     = document.getElementById('saveBtn');
const testBtn     = document.getElementById('testBtn');
const newConvBtn  = document.getElementById('newConvBtn');
const convBadge   = document.getElementById('convBadge');

const $ = id => document.getElementById(id);
const inpApiBase    = $('inputApiBase');
const inpEndpoint   = $('inputEndpoint');
const inpApiKey     = $('inputApiKey');
const inpMode       = $('inputMode');

// ===== Config =====
function loadConfig() {
  try {
    const raw = localStorage.getItem('dify_chat_config');
    if (raw) return { ...DEFAULTS, ...JSON.parse(raw) };
  } catch (_) {}
  return { ...DEFAULTS };
}
function saveConfig() {
  try { localStorage.setItem('dify_chat_config', JSON.stringify(config)); } catch (_) {}
}
function getUrl() {
  const base = config.apiBase.replace(/\/+$/, '');
  const path = config.endpoint.startsWith('/') ? config.endpoint : '/' + config.endpoint;
  return base + path;
}

function setStatus(ok, text) {
  statusDot.className = 'status-dot' + (ok ? ' ok' : ' err');
  statusText.textContent = text;
}

// ===== Toast =====
let toastTimer = null;
function showToast(msg, type = '', duration = 4000) {
  toastEl.textContent = msg;
  toastEl.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
}

// ===== Messages =====
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.dataset.id = ++msgId;
  div.innerHTML = `
    <div class="avatar">${role === 'user' ? '👤' : '🌱'}</div>
    <div class="bubble">${marked(text)}</div>`;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

let typingEl = null;
function showTyping() {
  if (typingEl) return;
  typingEl = document.createElement('div');
  typingEl.className = 'message bot';
  typingEl.dataset.id = ++msgId;
  typingEl.innerHTML = `
    <div class="avatar">🌱</div>
    <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  chatEl.appendChild(typingEl);
  chatEl.scrollTop = chatEl.scrollHeight;
}
function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ===== Markdown =====
function marked(text) {
  if (!text) return '';
  let html = text
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
      const a = lang ? ` class="language-${lang}"` : '';
      return `<pre><code${a}>${escHtml(code.trim())}</code></pre>`;
    })
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    .replace(/\n/g, '<br>');
  html = html.replace(/(<br>\s*){2,}/g, '</p><p>');
  if (!html.startsWith('<pre') && !html.startsWith('<p>')) html = '<p>' + html + '</p>';
  return html;
}
function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ===== Strip think tags =====
function stripThink(text) {
  if (!text) return '';
  let r = text;
  r = r.replace(/<think>[\s\S]*?<\/think>/g, '');
  r = r.replace(/\[think\][\s\S]*?\[\/think\]/g, '');
  r = r.replace(/^思考[：:].*?(?:\n|$)/gm, '');
  r = r.replace(/^\s*[\r\n]/gm, '');
  return r.trim();
}

// ===== Update conv badge =====
function updateConvBadge() {
  if (conversationId) {
    convBadge.style.display = 'inline-flex';
    convBadge.textContent = '💬 对话中';
  } else {
    convBadge.style.display = 'none';
  }
}

// ===== New conversation =====
function newConversation() {
  conversationId = null;
  updateConvBadge();
  setStatus(true, '新对话已开始');
  showToast('🔄 已清除记忆，开始新对话', 'success', 3000);
}

// ===== Send =====
async function send() {
  const text = inputEl.value.trim();
  if (!text || isRunning) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  addMessage('user', text);
  isRunning = true;
  sendBtn.disabled = true;
  showTyping();

  const body = {
    inputs: {},
    query: text,
    response_mode: config.mode,
    user: userId
  };
  if (conversationId) {
    body.conversation_id = conversationId;
  }

  try {
    const res = await fetch(getUrl(), {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${config.apiKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    hideTyping();

    if (!res.ok) {
      let errMsg = `HTTP ${res.status}`;
      try { const e = await res.json(); errMsg = e.message || errMsg; } catch(_){}
      const advice = errMsg.includes('conversation') ? '对话已过期，请点击"新对话"重新开始。' : '';
      addMessage('bot', `❌ **${errMsg}**` + (advice ? `\n\n💡 *${advice}*` : ''));
      showToast(errMsg, 'error', 6000);
      setStatus(false, `错误: ${errMsg}`);
      if (errMsg.includes('conversation')) conversationId = null;
      return;
    }

    const data = await res.json();

    // Save conversation_id from the first message
    if (data.conversation_id && !conversationId) {
      conversationId = data.conversation_id;
      updateConvBadge();
    }

    // Extract answer
    let reply = data.answer || '';
    if (!reply && data.message) reply = data.message;
    if (!reply) reply = '✅ 回复为空。';

    reply = stripThink(reply);
    addMessage('bot', reply);
    setStatus(true, conversationId ? '对话中' : '就绪');
    showToast('✓ 回复成功', 'success', 1500);

  } catch (err) {
    hideTyping();
    const msg = err.message || '未知错误';
    addMessage('bot', `❌ **网络错误**\n\n*${msg}*`);
    showToast('网络错误: ' + msg, 'error', 6000);
    setStatus(false, '网络错误');
  } finally {
    isRunning = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ===== Settings =====
function openSettings() {
  inpApiBase.value  = config.apiBase;
  inpEndpoint.value = config.endpoint;
  inpApiKey.value   = config.apiKey;
  inpMode.value     = config.mode;
  overlay.classList.add('open');
}
function closeSettings() { overlay.classList.remove('open'); }
function saveSettings() {
  config.apiBase   = inpApiBase.value.trim();
  config.endpoint  = inpEndpoint.value.trim();
  config.apiKey    = inpApiKey.value.trim();
  config.mode      = inpMode.value;
  saveConfig();
  closeSettings();
  showToast('✓ 配置已保存', 'success', 2000);
}

async function testConnection() {
  const apiBase   = inpApiBase.value.trim();
  const endpoint  = inpEndpoint.value.trim();
  const apiKey    = inpApiKey.value.trim();
  const base = apiBase.replace(/\/+$/, '');
  const path = endpoint.startsWith('/') ? endpoint : '/' + endpoint;
  const url  = base + path;

  testBtn.disabled = true;
  testBtn.textContent = '⏳ 测试中…';
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ inputs: {}, query: 'ping', response_mode: 'blocking', user: 'test-' + Date.now().toString(36) })
    });
    let detail = '';
    try { const j = await res.json(); detail = JSON.stringify(j, null, 2).slice(0, 500); } catch(_) { detail = await res.text(); }
    if (res.ok) {
      showToast('✓ 连接成功！', 'success', 4000);
      config.apiBase = apiBase; config.endpoint = endpoint; config.apiKey = apiKey; config.mode = inpMode.value;
      saveConfig();
      alert(`✅ 连接成功\n\n${detail}`);
    } else {
      alert(`❌ 请求失败 (${res.status})\n\n${detail}`);
    }
  } catch (err) {
    alert('❌ 网络错误\n\n' + (err.message || ''));
  } finally {
    testBtn.disabled = false;
    testBtn.textContent = '🔍 测试连接';
  }
}

// ===== Events =====
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
});
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
sendBtn.addEventListener('click', send);

// Quick action buttons
document.querySelectorAll('.q-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    inputEl.value = btn.dataset.text;
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
    inputEl.focus();
    setTimeout(() => send(), 100);
  });
});

toggleBtn.addEventListener('click', openSettings);
closeBtn.addEventListener('click', closeSettings);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeSettings(); });
saveBtn.addEventListener('click', saveSettings);
testBtn.addEventListener('click', testConnection);
newConvBtn.addEventListener('click', () => { closeSettings(); newConversation(); });

fetch('https://api.dify.ai/v1/parameters', {
  headers: { 'Authorization': `Bearer ${config.apiKey}` }
}).then(r => {
  if (r.ok) setStatus(true, '已连接 · Dify Cloud Chatflow');
}).catch(() => {});
